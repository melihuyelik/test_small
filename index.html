<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #050508;
      color: #d0d8e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.6;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      z-index: 0;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: #cc1100;
      top: -200px;
      left: -150px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: #0077cc;
      bottom: -150px;
      right: -100px;
      animation: drift2 14s ease-in-out infinite alternate;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: #cc7700;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: drift3 10s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 80px) scale(1.2); }
    }

    @keyframes drift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-50px, -70px) scale(1.15); }
    }

    @keyframes drift3 {
      from { transform: translate(-50%, -50%) scale(1); }
      to   { transform: translate(calc(-50% + 40px), calc(-50% + 60px)) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3.5rem 2.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      max-width: 720px;
      width: 90%;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(60px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      padding: 4px 16px;
      border: 1px solid #cc1100;
      color: #ff6644;
      border-radius: 999px;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: pulse-border 3s ease-in-out infinite, fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(204, 17, 0, 0.5); }
      50%       { box-shadow: 0 0 0 8px rgba(204, 17, 0, 0); }
    }

    .glitch {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(204, 17, 0, 0.7), 0 0 60px rgba(0, 119, 204, 0.4);
      animation: glitch-skew 4s infinite linear alternate-reverse;
      line-height: 1.1;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
    }

    .glitch::before {
      color: #0099ff;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      animation: glitch-anim 3s infinite linear alternate-reverse;
      left: 2px;
    }

    .glitch::after {
      color: #cc1100;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      animation: glitch-anim2 2.5s infinite linear alternate-reverse;
      left: -2px;
    }

    @keyframes glitch-anim {
      0%   { transform: skew(0deg); opacity: 1; }
      20%  { transform: skew(-2deg) translateX(3px); opacity: 0.8; }
      40%  { transform: skew(0deg); opacity: 1; }
      60%  { transform: skew(1deg) translateX(-2px); opacity: 0.9; }
      80%  { transform: skew(-1deg); opacity: 1; }
      100% { transform: skew(0deg); }
    }

    @keyframes glitch-anim2 {
      0%   { transform: skew(0deg); }
      25%  { transform: skew(2deg) translateX(-3px); opacity: 0.7; }
      50%  { transform: skew(0deg); opacity: 1; }
      75%  { transform: skew(-2deg) translateX(2px); }
      100% { transform: skew(0deg); }
    }

    @keyframes glitch-skew {
      0%, 90%, 100% { transform: skew(0deg); }
      92% { transform: skew(-1.5deg); }
      95% { transform: skew(1deg); }
    }

    .subtitle {
      margin-top: 1rem;
      font-size: 1rem;
      color: rgba(208, 216, 224, 0.45);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeUp 1.2s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .countdown {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin: 2.5rem 0;
      animation: fadeUp 1.2s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      min-width: 80px;
      transition: border-color 0.3s;
    }

    .unit:hover {
      border-color: rgba(204, 17, 0, 0.4);
    }

    .unit span {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #ffffff, #ffaa44);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .unit label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(208, 216, 224, 0.35);
    }

    .line {
      height: 1px;
      background: linear-gradient(90deg, transparent, #cc1100, #0077cc, #cc7700, transparent);
      background-size: 200% 100%;
      margin: 0 auto 1.5rem;
      width: 80%;
      animation: shimmer 3s linear infinite, fadeUp 1.2s 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }

    .tagline {
      font-size: 0.7rem;
      color: rgba(208, 216, 224, 0.2);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: fadeUp 1.2s 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      padding: 1rem 2rem;
      font-size: 0.7rem;
      color: rgba(208, 216, 224, 0.25);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(to top, rgba(5, 5, 8, 0.8), transparent);
      animation: fadeUp 1.2s 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    footer a {
      color: rgba(255, 102, 68, 0.6);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: #ff6644;
    }

    @media (max-width: 480px) {
      .countdown {
        gap: 0.75rem;
      }
      .unit {
        min-width: 60px;
        padding: 0.75rem 0.75rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="noise"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <main class="container">
    <div class="badge">2026</div>
    <h1 class="glitch" data-text="COMING SOON">COMING SOON</h1>
    <p class="subtitle">Bir şeyler geliyor. Hazır ol.</p>
    <div class="countdown">
      <div class="unit"><span id="days">00</span><label>Gün</label></div>
      <div class="unit"><span id="hours">00</span><label>Saat</label></div>
      <div class="unit"><span id="mins">00</span><label>Dakika</label></div>
      <div class="unit"><span id="secs">00</span><label>Saniye</label></div>
    </div>
    <div class="line"></div>
    <p class="tagline">© 2026 — The Future Is Now</p>
  </main>

  <footer>
    <span>© 2026 All rights reserved &mdash; <a href="#">İletişim</a></span>
  </footer>

  <script>
    // Particle system
    (function () {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      const COLORS = ['#cc1100', '#0099ff', '#cc7700', '#ffffff', '#ff6644'];
      let particles = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createParticles() {
        particles = [];
        for (let i = 0; i < 120; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.6,
            vy: (Math.random() - 0.5) * 0.6,
            radius: Math.random() * 2 + 0.5,
            alpha: Math.random() * 0.6 + 0.2,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleOffset: Math.random() * Math.PI * 2
          });
        }
      }

      let frame = 0;

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < -10) p.x = canvas.width + 10;
          if (p.x > canvas.width + 10) p.x = -10;
          if (p.y < -10) p.y = canvas.height + 10;
          if (p.y > canvas.height + 10) p.y = -10;

          const twinkle = 0.5 + 0.5 * Math.sin(frame * p.twinkleSpeed + p.twinkleOffset);
          const alpha = p.alpha * (0.4 + 0.6 * twinkle);

          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
      }

      resize();
      createParticles();
      animate();

      window.addEventListener('resize', () => {
        resize();
        createParticles();
      });
    })();

    // Countdown timer
    (function () {
      const target = new Date('2027-01-01T00:00:00').getTime();
      const els = {
        days:  document.getElementById('days'),
        hours: document.getElementById('hours'),
        mins:  document.getElementById('mins'),
        secs:  document.getElementById('secs')
      };

      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function update() {
        const diff = target - Date.now();
        if (diff <= 0) {
          els.days.textContent = '00';
          els.hours.textContent = '00';
          els.mins.textContent = '00';
          els.secs.textContent = '00';
          return;
        }
        els.days.textContent  = pad(Math.floor(diff / 86400000));
        els.hours.textContent = pad(Math.floor((diff % 86400000) / 3600000));
        els.mins.textContent  = pad(Math.floor((diff % 3600000) / 60000));
        els.secs.textContent  = pad(Math.floor((diff % 60000) / 1000));
      }

      update();
      setInterval(update, 1000);
    })();
  </script>
</body>
</html>
