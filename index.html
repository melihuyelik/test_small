<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #050508;
      color: #d0d8e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.7;
    }

    #globe {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: #cc1100;
      top: -200px;
      left: -150px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: #0077cc;
      bottom: -150px;
      right: -100px;
      animation: drift2 14s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 80px) scale(1.2); }
    }

    @keyframes drift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-50px, -70px) scale(1.15); }
    }

    /* Top content — above the globe */
    .top-content {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      padding: 4vh 2rem 0;
      pointer-events: none;
      animation: fadeDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Bottom content — below the globe */
    .bottom-content {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      padding: 0 2rem 3vh;
      pointer-events: auto;
      animation: fadeUp 1.2s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      padding: 4px 18px;
      border: 1px solid rgba(204, 17, 0, 0.6);
      color: #ff6644;
      border-radius: 999px;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      animation: pulse-border 3s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(204, 17, 0, 0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(204, 17, 0, 0); }
    }

    .glitch {
      font-size: clamp(2.2rem, 7vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      position: relative;
      color: #ffffff;
      text-shadow:
        0 0 25px rgba(204, 17, 0, 0.6),
        0 0 50px rgba(0, 119, 204, 0.3),
        0 2px 40px rgba(0,0,0,0.8);
      animation: glitch-skew 4s infinite linear alternate-reverse;
      line-height: 1.05;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
    }

    .glitch::before {
      color: #0099ff;
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
      animation: glitch-anim 3s infinite linear alternate-reverse;
      left: 2px;
    }

    .glitch::after {
      color: #cc1100;
      clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
      animation: glitch-anim2 2.5s infinite linear alternate-reverse;
      left: -2px;
    }

    @keyframes glitch-anim {
      0%   { transform: skew(0deg); opacity: 1; }
      20%  { transform: skew(-2deg) translateX(3px); opacity: 0.8; }
      40%  { transform: skew(0deg); opacity: 1; }
      60%  { transform: skew(1deg) translateX(-2px); opacity: 0.9; }
      80%  { transform: skew(-1deg); opacity: 1; }
      100% { transform: skew(0deg); }
    }

    @keyframes glitch-anim2 {
      0%   { transform: skew(0deg); }
      25%  { transform: skew(2deg) translateX(-3px); opacity: 0.7; }
      50%  { transform: skew(0deg); opacity: 1; }
      75%  { transform: skew(-2deg) translateX(2px); }
      100% { transform: skew(0deg); }
    }

    @keyframes glitch-skew {
      0%, 90%, 100% { transform: skew(0deg); }
      92% { transform: skew(-1.5deg); }
      95% { transform: skew(1deg); }
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(208, 216, 224, 0.55);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
    }

    .countdown {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      min-width: 72px;
    }

    .unit span {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(160deg, #ffffff 20%, #ffaa44 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      text-shadow: none;
    }

    .unit label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(208, 216, 224, 0.35);
    }

    .line {
      height: 1px;
      background: linear-gradient(90deg, transparent, #cc1100, #0077cc, #cc7700, transparent);
      background-size: 200% 100%;
      margin: 0 auto 1.2rem;
      width: 60%;
      max-width: 360px;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }

    .tagline {
      font-size: 0.65rem;
      color: rgba(208, 216, 224, 0.2);
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.025;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      text-align: center;
      padding: 0.6rem 2rem;
      font-size: 0.65rem;
      color: rgba(208, 216, 224, 0.2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: auto;
    }

    footer a {
      color: rgba(255, 102, 68, 0.5);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: #ff6644;
    }

    @media (max-width: 480px) {
      .countdown { gap: 0.7rem; }
      .unit { min-width: 56px; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="noise"></div>
  <canvas id="globe"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Top content: above the globe -->
  <div class="top-content">
    <div class="badge">2026</div>
    <h1 class="glitch" data-text="COMING SOON">COMING SOON</h1>
  </div>

  <!-- Bottom content: below the globe -->
  <div class="bottom-content">
    <p class="subtitle">Bir şeyler geliyor. Hazır ol.</p>
    <div class="countdown">
      <div class="unit"><span id="days">00</span><label>Gün</label></div>
      <div class="unit"><span id="hours">00</span><label>Saat</label></div>
      <div class="unit"><span id="mins">00</span><label>Dakika</label></div>
      <div class="unit"><span id="secs">00</span><label>Saniye</label></div>
    </div>
    <div class="line"></div>
    <p class="tagline">© 2026 — The Future Is Now</p>
  </div>

  <footer>
    <span>© 2026 All rights reserved &mdash; <a href="#">İletişim</a></span>
  </footer>

  <script>
    // ─── Particle system ────────────────────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      const COLORS = ['#cc1100', '#0099ff', '#cc7700', '#ffffff', '#ff6644', '#4488ff'];
      let particles = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createParticles() {
        particles = [];
        for (let i = 0; i < 140; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            radius: Math.random() * 1.8 + 0.3,
            alpha: Math.random() * 0.55 + 0.15,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            twinkleSpeed: Math.random() * 0.018 + 0.004,
            twinkleOffset: Math.random() * Math.PI * 2
          });
        }
      }

      let frame = 0;

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < -10) p.x = canvas.width + 10;
          if (p.x > canvas.width + 10) p.x = -10;
          if (p.y < -10) p.y = canvas.height + 10;
          if (p.y > canvas.height + 10) p.y = -10;

          const twinkle = 0.5 + 0.5 * Math.sin(frame * p.twinkleSpeed + p.twinkleOffset);
          const alpha = p.alpha * (0.35 + 0.65 * twinkle);

          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
      }

      resize();
      createParticles();
      animate();
      window.addEventListener('resize', () => { resize(); createParticles(); });
    })();

    // ─── Countdown timer ────────────────────────────────────────────────────────
    (function () {
      const target = new Date('2027-01-01T00:00:00').getTime();
      const els = {
        days:  document.getElementById('days'),
        hours: document.getElementById('hours'),
        mins:  document.getElementById('mins'),
        secs:  document.getElementById('secs')
      };

      function pad(n) { return String(n).padStart(2, '0'); }

      function update() {
        const diff = target - Date.now();
        if (diff <= 0) {
          els.days.textContent = els.hours.textContent = els.mins.textContent = els.secs.textContent = '00';
          return;
        }
        els.days.textContent  = pad(Math.floor(diff / 86400000));
        els.hours.textContent = pad(Math.floor((diff % 86400000) / 3600000));
        els.mins.textContent  = pad(Math.floor((diff % 3600000) / 60000));
        els.secs.textContent  = pad(Math.floor((diff % 60000) / 1000));
      }

      update();
      setInterval(update, 1000);
    })();

    // ─── 3D Globe with realistic satellites ────────────────────────────────────
    (function () {
      const canvas = document.getElementById('globe');
      const ctx = canvas.getContext('2d');

      let R, SIZE, cx, cy;

      function calcDimensions() {
        R = Math.min(window.innerWidth, window.innerHeight) * 0.36;
        SIZE = R * 3.8;
        cx = SIZE / 2;
        cy = SIZE / 2;
        canvas.width = SIZE;
        canvas.height = SIZE;
      }

      calcDimensions();

      // Continent outlines [lon, lat]
      const continents = [
        // Africa
        [[-18,15],[-14,10],[-15,4],[-8,-4],[5,-2],[10,5],[3,5],[2,7],[5,12],[15,22],[22,37],[37,37],[44,12],[52,12],[50,8],[42,-5],[40,-12],[36,-22],[28,-35],[18,-35],[12,-18],[8,-2],[-5,5],[-15,10],[-18,15]],
        // Europe
        [[-10,36],[0,36],[15,37],[28,36],[36,42],[40,43],[36,55],[25,61],[15,60],[5,62],[0,58],[-5,50],[-10,44],[-10,36]],
        // Asia
        [[36,42],[50,44],[60,43],[75,45],[90,52],[105,55],[120,54],[130,42],[130,36],[120,24],[110,20],[100,10],[95,5],[90,22],[80,30],[70,25],[60,22],[55,26],[50,30],[45,38],[40,38],[36,42]],
        // North America
        [[-170,72],[-140,70],[-100,72],[-82,68],[-70,65],[-52,47],[-60,45],[-70,42],[-75,38],[-80,30],[-85,25],[-90,20],[-87,15],[-82,8],[-78,8],[-75,10],[-80,22],[-100,22],[-108,28],[-118,32],[-122,38],[-124,47],[-130,54],[-140,58],[-155,60],[-165,64],[-170,72]],
        // South America
        [[-80,8],[-75,10],[-60,6],[-50,2],[-35,-5],[-35,-10],[-38,-18],[-44,-24],[-48,-28],[-52,-34],[-60,-40],[-65,-45],[-68,-50],[-72,-50],[-70,-42],[-72,-38],[-72,-30],[-70,-18],[-76,-6],[-80,0],[-80,8]],
        // Australia
        [[114,-22],[120,-20],[128,-16],[136,-12],[140,-18],[148,-20],[154,-28],[152,-38],[144,-38],[132,-32],[116,-34],[114,-28],[114,-22]],
        // Antarctica
        [[-180,-70],[-120,-68],[-60,-72],[0,-68],[60,-72],[120,-68],[180,-70],[180,-90],[-180,-90],[-180,-70]],
      ];

      // Satellite definitions
      // aR/bR: semi-axes ratio to R  |  inclAmp: vertical tilt ratio  |  speed: rad/frame
      // trailLen: trail point count  |  rgb: color string
      const satDefs = [
        { aR: 1.44, bR: 1.24, inclAmp: 0.24, speed:  0.0095, phase: 0,              rgb: '30,210,255',  trailLen: 28 },
        { aR: 1.60, bR: 1.42, inclAmp: 0.06, speed:  0.0058, phase: Math.PI * 0.65, rgb: '200,160,255', trailLen: 22 },
        { aR: 1.36, bR: 1.18, inclAmp: 0.36, speed: -0.0075, phase: Math.PI * 1.38, rgb: '255,175,30',  trailLen: 26 },
        { aR: 1.52, bR: 1.32, inclAmp: 0.16, speed:  0.0115, phase: Math.PI * 1.88, rgb: '80,255,140',  trailLen: 30 },
        { aR: 1.48, bR: 1.30, inclAmp: 0.30, speed: -0.0068, phase: Math.PI * 0.42, rgb: '255,90,70',   trailLen: 24 },
      ];

      let angle = 0;

      function project(lon, lat, rotDeg) {
        const phi   = (lat * Math.PI) / 180;
        const theta = ((lon + rotDeg) * Math.PI) / 180;
        const x3 = Math.cos(phi) * Math.sin(theta);
        const y3 = -Math.sin(phi);
        const z3 = Math.cos(phi) * Math.cos(theta);
        return { x: cx + R * x3, y: cy + R * y3, z: z3 };
      }

      // Get satellite canvas position at a given orbit angle
      function orbitPoint(def, theta) {
        const a  = R * def.aR;
        const b  = R * def.bR;
        const sx = a * Math.cos(theta);
        const sz = b * Math.sin(theta);
        const sy = R * def.inclAmp * Math.sin(theta + def.phase * 0.3);
        return { x: cx + sx, y: cy + sy, z: sz };
      }

      // Current position of satellite based on global angle
      function satPos(def, t) {
        return orbitPoint(def, def.phase + t * def.speed);
      }

      function drawOrbitPath(def) {
        const steps = 200;
        ctx.lineWidth = 0.8;

        for (let i = 0; i < steps; i++) {
          const theta1 = (i / steps) * Math.PI * 2;
          const theta2 = ((i + 1) / steps) * Math.PI * 2;
          const p1 = orbitPoint(def, theta1);
          const p2 = orbitPoint(def, theta2);

          // Front side: brighter, back side: very faint
          const isFront = p1.z > 0;
          const alpha = isFront ? 0.14 : 0.035;

          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = `rgba(${def.rgb},${alpha})`;
          ctx.stroke();
        }
      }

      function drawSatellite(def, t) {
        const TRAIL_STEPS = def.trailLen;
        const DT = 0.08;

        // Build trail (oldest → newest)
        const pts = [];
        for (let i = TRAIL_STEPS; i >= 0; i--) {
          pts.push(satPos(def, t - i * DT));
        }

        // Draw fading trail
        ctx.lineWidth = 1.6;
        for (let i = 1; i < pts.length; i++) {
          const p    = pts[i];
          const prev = pts[i - 1];
          if (p.z <= 0 || prev.z <= 0) continue;
          const alpha = (i / pts.length) * 0.6;
          ctx.beginPath();
          ctx.moveTo(prev.x, prev.y);
          ctx.lineTo(p.x, p.y);
          ctx.strokeStyle = `rgba(${def.rgb},${alpha})`;
          ctx.stroke();
        }

        // Draw satellite body (head of trail)
        const head = pts[pts.length - 1];
        if (head.z <= 0) return;

        // Depth-based scale (closer = slightly larger)
        const depthScale = 0.75 + head.z * 0.3;
        const dotR   = Math.max(1.8, R * 0.015) * depthScale;
        const panelL = dotR * 2.6;
        const panelT = dotR * 0.45;

        ctx.save();
        ctx.translate(head.x, head.y);

        // Outer glow halo
        const glowR = dotR * 5.5;
        const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
        glow.addColorStop(0,   `rgba(${def.rgb},0.8)`);
        glow.addColorStop(0.3, `rgba(${def.rgb},0.25)`);
        glow.addColorStop(1,   `rgba(${def.rgb},0)`);
        ctx.beginPath();
        ctx.arc(0, 0, glowR, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // Left solar panel
        ctx.fillStyle = `rgba(${def.rgb},0.85)`;
        ctx.fillRect(-panelL - dotR, -panelT / 2, panelL, panelT);

        // Right solar panel
        ctx.fillRect(dotR, -panelT / 2, panelL, panelT);

        // Central body
        ctx.fillStyle = `rgb(${def.rgb})`;
        ctx.fillRect(-dotR, -dotR, dotR * 2, dotR * 2);

        // Specular highlight on body
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(-dotR * 0.5, -dotR * 0.9, dotR * 0.5, dotR * 0.4);

        ctx.restore();
      }

      function drawGlobe(rotDeg) {
        ctx.clearRect(0, 0, SIZE, SIZE);

        // Draw orbit paths behind globe first
        for (const def of satDefs) drawOrbitPath(def);

        // Ocean sphere
        const oceanGrad = ctx.createRadialGradient(cx - R * 0.32, cy - R * 0.32, R * 0.04, cx, cy, R);
        oceanGrad.addColorStop(0,   '#1e6ab8');
        oceanGrad.addColorStop(0.4, '#0b3068');
        oceanGrad.addColorStop(1,   '#040c1c');
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.fillStyle = oceanGrad;
        ctx.fill();

        // Clip to globe circle
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.clip();

        // Longitude grid lines
        ctx.strokeStyle = 'rgba(60,140,255,0.12)';
        ctx.lineWidth = 0.5;
        for (let lon = 0; lon < 360; lon += 30) {
          ctx.beginPath();
          let first = true;
          for (let lat = -90; lat <= 90; lat += 2) {
            const p = project(lon, lat, rotDeg);
            if (p.z < 0) { first = true; continue; }
            first ? (ctx.moveTo(p.x, p.y), first = false) : ctx.lineTo(p.x, p.y);
          }
          ctx.stroke();
        }

        // Latitude grid lines
        for (let lat = -60; lat <= 60; lat += 30) {
          ctx.beginPath();
          let first = true;
          for (let lon = 0; lon <= 360; lon += 2) {
            const p = project(lon, lat, rotDeg);
            if (p.z < 0) { first = true; continue; }
            first ? (ctx.moveTo(p.x, p.y), first = false) : ctx.lineTo(p.x, p.y);
          }
          ctx.stroke();
        }

        // Continent fills
        ctx.fillStyle   = 'rgba(38,170,75,0.78)';
        ctx.strokeStyle = 'rgba(70,220,100,0.55)';
        ctx.lineWidth   = 0.8;
        for (const continent of continents) {
          ctx.beginPath();
          let first = true;
          for (const [lon, lat] of continent) {
            const p = project(lon, lat, rotDeg);
            if (p.z < 0) { first = true; continue; }
            first ? (ctx.moveTo(p.x, p.y), first = false) : ctx.lineTo(p.x, p.y);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }

        // City/light dots on night side — subtle effect
        ctx.restore();

        // Atmosphere glow
        const atmGrad = ctx.createRadialGradient(cx, cy, R * 0.88, cx, cy, R * 1.22);
        atmGrad.addColorStop(0,   'rgba(30,100,255,0)');
        atmGrad.addColorStop(0.4, 'rgba(40,120,255,0.18)');
        atmGrad.addColorStop(0.8, 'rgba(20,60,200,0.06)');
        atmGrad.addColorStop(1,   'rgba(20,60,200,0)');
        ctx.beginPath();
        ctx.arc(cx, cy, R * 1.22, 0, Math.PI * 2);
        ctx.fillStyle = atmGrad;
        ctx.fill();

        // Specular highlight + shadow
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.clip();

        // Highlight (top-left)
        const specGrad = ctx.createRadialGradient(
          cx - R * 0.38, cy - R * 0.38, 0,
          cx - R * 0.18, cy - R * 0.18, R * 0.65
        );
        specGrad.addColorStop(0, 'rgba(255,255,255,0.20)');
        specGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = specGrad;
        ctx.fillRect(0, 0, SIZE, SIZE);

        // Shadow (right side)
        const shadowGrad = ctx.createRadialGradient(
          cx + R * 0.55, cy + R * 0.25, 0,
          cx + R * 0.2,  cy,            R * 1.1
        );
        shadowGrad.addColorStop(0, 'rgba(0,0,0,0.6)');
        shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = shadowGrad;
        ctx.fillRect(0, 0, SIZE, SIZE);
        ctx.restore();

        // Draw satellites on top of globe
        for (const def of satDefs) drawSatellite(def, angle);
      }

      function animate() {
        angle += 0.003;
        drawGlobe((angle * 180) / Math.PI);
        requestAnimationFrame(animate);
      }

      animate();

      window.addEventListener('resize', () => { calcDimensions(); });
    })();
  </script>
</body>
</html>
